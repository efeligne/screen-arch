name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build macOS binaries
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: |
          GOOS=darwin GOARCH=${{ matrix.arch }} \
            go build -o screen-arch-darwin-${{ matrix.arch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: screen-arch-darwin-${{ matrix.arch }}
          path: screen-arch-darwin-${{ matrix.arch }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: screen-arch-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: screen-arch-*
          generate_release_notes: true
